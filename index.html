<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sister</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    background: pink;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow-x: hidden;
    height: 100%;
  }

  .center {
    text-align: center;
    position: relative;
    z-index: 2;
    padding-top: 50px;
  }

  .countdown, .big-countdown, .message {
    font-weight: bold;
    font-size: 2rem;
    color: #fff;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
    margin: 20px 0;
    opacity: 0;
  }

  .big-countdown span {
    display: inline-block;
    font-size: 3rem;
    margin: 0 5px;
  }

  .sister {
    font-size: 3rem;
    color: #ff0066;
    margin-top: 20px;
    opacity: 0;
    transition: opacity 1s ease-in;
  }

  .typing-message {
    font-size: 1.2rem;
    max-width: 90%;
    margin: 20px auto;
    color: #fff;
    white-space: pre-wrap;
    font-weight: 500;
  }

  /* Rose animation */
  .rose-container {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 50%;
    pointer-events: none;
    overflow: hidden;
  }

  .rose {
    position: absolute;
    bottom: -50px;
    width: 40px;
    height: 40px;
    background: red;
    border-radius: 50%;
    animation: grow 2s forwards;
  }

  @keyframes grow {
    0% { transform: translateY(100%) scale(0); opacity:0; }
    50% { transform: translateY(0) scale(0.5); opacity:0.7; }
    100% { transform: translateY(0) scale(1); opacity:1; }
  }

  /* Confetti */
  .confetti {
    position: fixed;
    top: 0;
    width: 10px;
    height: 10px;
    background: yellow;
    opacity: 0.8;
    z-index: 3;
    pointer-events: none;
    animation: fall linear forwards;
  }

  @keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); }
  }

  @media (max-width: 600px) {
    .big-countdown span { font-size: 2rem; }
    .sister { font-size: 2rem; }
    .message { font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="center">
  <div class="countdown">3</div>
  <div class="countdown">2</div>
  <div class="countdown">1</div>

  <div class="big-countdown">
    <span>Happy</span>
    <span>Birthday</span>
    <span>to</span>
    <span>You</span>
  </div>

  <div class="sister">Happy Birthday Sister</div>

  <div class="typing-message" id="typing"></div>
</div>

<div class="rose-container" id="roses"></div>

<script>
  // Countdown sequence
  const countdownElements = document.querySelectorAll('.countdown');
  const bigCountdown = document.querySelector('.big-countdown');
  const sisterText = document.querySelector('.sister');
  let delay = 0;

  countdownElements.forEach((el, i) => {
    setTimeout(() => {
      el.style.opacity = 1;
      setTimeout(() => el.style.opacity = 0, 800);
    }, i * 1000);
    delay = i * 1000 + 1000;
  });

  setTimeout(() => {
    bigCountdown.style.opacity = 1;
  }, delay);

  setTimeout(() => {
    sisterText.style.opacity = 1;
    startRoses();
    startTyping();
  }, delay + 2000);

  // Roses grow animation
  function startRoses() {
    const roseContainer = document.getElementById('roses');
    for(let i=0; i<20; i++) {
      const rose = document.createElement('div');
      rose.classList.add('rose');
      rose.style.left = Math.random() * 90 + '%';
      rose.style.animationDelay = (i * 0.2) + 's';
      roseContainer.appendChild(rose);
    }
  }

  // Typing effect
  const message = `May love and laughter Light your days And warm your heart and home;
May good and faithful friends be yours Wherever you may roam;
May peace and plenty bless your world With joy that long endures;
May all life's passing
