<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Happy Birthday Cicy! 🌹</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      background: radial-gradient(ellipse at center, #1a0010 0%, #0d0008 60%, #000 100%);
      font-family: 'Nunito', sans-serif;
      color: #6d1f3e;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEART CANVAS (background) ── */
    #heart-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* ── PAGE ── */
    #page {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: 32px 16px 32px;
    }

    /* ══════════════════════
       INTRO OVERLAY
    ══════════════════════ */
    #intro {
      position: fixed; inset: 0; z-index: 3000;
      background: radial-gradient(ellipse at center, #9b1b30 0%, #4a0010 100%);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 4px;
      transition: opacity .9s ease;
    }
    #intro.hide { opacity: 0; pointer-events: none; }

    #intro-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(8rem, 30vw, 17rem);
      font-weight: 600; color: #fff; line-height: 1;
      text-shadow: 0 0 100px rgba(255,120,120,.65), 0 0 40px rgba(255,200,200,.35);
    }
    #intro-word {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(2rem, 8vw, 5rem);
      color: #ffb3c6; letter-spacing: 5px;
      min-height: 1.2em; text-align: center;
      padding: 0 20px;
    }

    .pulse { animation: pulse .6s cubic-bezier(.36,.07,.19,.97); }
    @keyframes pulse {
      0%  { transform: scale(.15) rotate(-10deg); opacity: 0; }
      55% { transform: scale(1.18) rotate(3deg);  opacity: 1; }
      80% { transform: scale(.96); }
      100%{ transform: scale(1);   opacity: 1; }
    }
    .fadeWord { animation: fadeWord .55s ease-out forwards; }
    @keyframes fadeWord {
      from { opacity:0; transform: translateY(22px) scale(.88); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* ── CONFETTI ── */
    #confetti-canvas {
      position: fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:2;
      opacity:0; transition:opacity .6s;
    }
    #confetti-canvas.show { opacity:1; }

    /* ══════════════════════
       CARD
    ══════════════════════ */
    .card {
      position: relative; z-index: 10;
      background: rgba(255,240,245,.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 2px solid rgba(244,143,177,.8);
      border-radius: 28px;
      padding: clamp(28px,6vw,50px) clamp(20px,6vw,52px) clamp(28px,6vw,46px);
      max-width: 560px; width: 100%;
      text-align: center;
      box-shadow:
        0 8px 60px rgba(214,58,110,.18),
        0 2px 20px rgba(0,0,0,.07),
        inset 0 1px 0 rgba(255,255,255,.9);
      opacity:0; transform:translateY(44px) scale(.97);
      transition: opacity 1s ease, transform 1s ease;
    }
    .card.visible { opacity:1; transform:translateY(0) scale(1); }

    .petals-top {
      font-size: clamp(1.3rem,4vw,1.9rem);
      letter-spacing:8px; margin-bottom:10px; display:block;
      animation: petalSway 4s ease-in-out infinite alternate;
    }
    @keyframes petalSway {
      from { transform: rotate(-4deg) scale(1); }
      to   { transform: rotate(4deg) scale(1.05); }
    }

    .hb-word {
      display:inline-block;
      font-family:'Cormorant Garamond',serif;
      font-weight:600; color:#d63a6e;
      opacity:0; transform:translateY(28px);
      transition:opacity .55s ease, transform .55s ease;
    }
    .hb-word.show { opacity:1; transform:translateY(0); }
    #word-happy, #word-bday { font-size:clamp(1.9rem,7vw,3.4rem); }
    #word-to   { font-size:clamp(1.3rem,4.5vw,2.3rem); color:#e91e8c; }
    #word-you  { font-size:clamp(1.6rem,6vw,2.9rem); font-style:italic; }

    .name {
      font-family:'Cormorant Garamond',serif; font-style:italic;
      font-size:clamp(1.6rem,6vw,2.7rem); color:#c0392b;
      margin:4px 0 18px;
      opacity:0; transform:translateY(18px);
      transition:opacity .7s ease, transform .7s ease;
    }
    .name.show { opacity:1; transform:translateY(0); }

    .divider {
      display:flex; align-items:center; justify-content:center;
      gap:10px; margin-bottom:20px;
      opacity:0; transition:opacity .7s ease;
    }
    .divider.show { opacity:1; }
    .divider-line { flex:1; max-width:60px; height:1.5px; background:linear-gradient(to right,transparent,#f48fb1,transparent); }
    .divider span { font-size:1.3rem; }

    .message-box {
      background:rgba(255,255,255,.76);
      border:1.5px solid #f8bbd0;
      border-radius:18px;
      padding:clamp(16px,4vw,26px) clamp(16px,4vw,28px);
      margin-bottom:22px; text-align:left; min-height:110px;
      opacity:0; transition:opacity .7s ease;
    }
    .message-box.show { opacity:1; }
    #typed-message {
      font-size:clamp(.875rem,2.8vw,1rem);
      line-height:1.85; color:#6d1f3e;
      white-space:pre-wrap; font-style:italic;
    }
    .cursor {
      display:inline-block; width:2px; height:1.1em;
      background:#d63a6e; margin-left:2px;
      vertical-align:text-bottom;
      animation:blink .65s step-end infinite;
    }
    @keyframes blink { 50%{opacity:0;} }

    .floral-bottom {
      margin-top:22px;
      font-size:clamp(1.1rem,3.5vw,1.5rem);
      letter-spacing:6px; opacity:0; transition:opacity .7s ease;
    }
    .floral-bottom.show { opacity:1; }

    /* balloon */
    .balloon {
      position:fixed; font-size:2rem; pointer-events:none;
      z-index:998; animation:riseUp linear forwards;
    }
    @keyframes riseUp {
      0%  { transform:translateY(0) rotate(-8deg); opacity:1; }
      50% { transform:translateY(-50vh) rotate(8deg); }
      100%{ transform:translateY(-105vh) rotate(-4deg); opacity:0; }
    }
  </style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div id="intro-number">3</div>
  <div id="intro-word"></div>
</div>

<canvas id="confetti-canvas"></canvas>
<canvas id="heart-canvas"></canvas>

<div id="page">
  <div class="card" id="mainCard">
    <span class="petals-top">🌸 🌹 🌸</span>
    <div>
      <span class="hb-word" id="word-happy">Happy</span>&nbsp;
      <span class="hb-word" id="word-bday">Birthday,</span>
    </div>
    <div>
      <span class="hb-word" id="word-to">To</span>&nbsp;
      <span class="hb-word" id="word-you">You</span>
    </div>
    <p class="name" id="nameEl">Cicy 🌹</p>
    <div class="divider" id="dividerEl">
      <div class="divider-line"></div><span>🌺</span><div class="divider-line"></div>
    </div>
    <div class="message-box" id="msgBox">
      <span id="typed-message"></span><span class="cursor"></span>
    </div>
    <div class="floral-bottom" id="floralBot">🌸 🌼 🌹 🌼 🌸</div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   INTRO — clean numbers then words
══════════════════════════════════════ */
const numEl  = document.getElementById('intro-number');
const wordEl = document.getElementById('intro-word');
const intro  = document.getElementById('intro');

const steps = [
  { num:'3', word:'',          dur:850  },
  { num:'2', word:'',          dur:850  },
  { num:'1', word:'',          dur:850  },
  { num:'',  word:'Happy',     dur:900  },
  { num:'',  word:'Birthday',  dur:900  },
  { num:'',  word:'To You!',   dur:1100 },
];
let si = 0;
function runStep() {
  if (si >= steps.length) {
    intro.classList.add('hide');
    setTimeout(revealCard, 900);
    return;
  }
  const s = steps[si];
  numEl.classList.remove('pulse');
  wordEl.classList.remove('fadeWord');
  void numEl.offsetWidth;
  numEl.textContent  = s.num;
  wordEl.textContent = s.word;
  if (s.num)  numEl.classList.add('pulse');
  if (s.word) { void wordEl.offsetWidth; wordEl.classList.add('fadeWord'); }
  si++;
  setTimeout(runStep, s.dur);
}
setTimeout(runStep, 400);

/* ══════════════════════════════════════
   REVEAL CARD
══════════════════════════════════════ */
const MESSAGE = `May love and laughter\nLight your days\nAnd warm your heart and home;\n\nMay good and faithful friends be yours\nWherever you may roam;\n\nMay peace and plenty bless your world\nWith joy that long endures;\n\nMay all life's passing seasons\nBring the best to you and yours!`;

function revealCard() {
  document.getElementById('mainCard').classList.add('visible');
  [['word-happy',300],['word-bday',750],['word-to',1200],['word-you',1650]]
    .forEach(([id,d]) => setTimeout(() => document.getElementById(id).classList.add('show'), d));
  setTimeout(() => document.getElementById('nameEl').classList.add('show'),    2200);
  setTimeout(() => document.getElementById('dividerEl').classList.add('show'), 2600);
  setTimeout(() => {
    document.getElementById('msgBox').classList.add('show');
    startTyping();
  }, 3000);
  setTimeout(() => document.getElementById('floralBot').classList.add('show'), 3400);
  document.getElementById('confetti-canvas').classList.add('show');
  setTimeout(initHeartParticles, 200);
}

/* ══════════════════════════════════════
   TYPING
══════════════════════════════════════ */
function startTyping() {
  const el = document.getElementById('typed-message');
  let i = 0;
  (function t() {
    if (i < MESSAGE.length) { el.textContent += MESSAGE[i++]; setTimeout(t, 22); }
    else document.querySelector('.cursor').style.display = 'none';
  })();
}

/* ══════════════════════════════════════
   CONFETTI
══════════════════════════════════════ */
const cv    = document.getElementById('confetti-canvas');
const ctx2d = cv.getContext('2d');
function resizeCV() { cv.width = innerWidth; cv.height = innerHeight; }
resizeCV(); window.addEventListener('resize', resizeCV);
const COLS = ['#f48fb1','#e91e8c','#fce4ec','#c0392b','#ffd6e7','#fff','#ff80ab','#ffcdd2'];
const pcs  = Array.from({length:110}, () => ({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight-innerHeight,
  w:5+Math.random()*7, h:8+Math.random()*8,
  c:COLS[Math.random()*COLS.length|0],
  r:Math.random()*360, vx:(Math.random()-.5)*1.3,
  vy:1.3+Math.random()*2, vr:(Math.random()-.5)*3, circle:Math.random()<.4
}));
(function drawConf(){
  ctx2d.clearRect(0,0,cv.width,cv.height);
  pcs.forEach(p=>{
    ctx2d.save(); ctx2d.translate(p.x,p.y); ctx2d.rotate(p.r*Math.PI/180);
    ctx2d.fillStyle=p.c; ctx2d.globalAlpha=.85;
    if(p.circle){ctx2d.beginPath();ctx2d.arc(0,0,p.w/2,0,Math.PI*2);ctx2d.fill();}
    else ctx2d.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx2d.restore();
    p.x+=p.vx; p.y+=p.vy; p.r+=p.vr;
    if(p.y>cv.height+20){p.y=-20; p.x=Math.random()*cv.width;}
  });
  requestAnimationFrame(drawConf);
})();

/* ══════════════════════════════════════
   "I LOVE YOU" HEART PARTICLES
   — 400 particles FILL the heart shape
   — slow romantic drift with random offsets
   — varied sizes for depth & realism
══════════════════════════════════════ */
function initHeartParticles() {
  const canvas = document.getElementById('heart-canvas');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); init(); });

  // Only "I love you" text + occasional heart symbol
  const WORDS = ['I love you','I love you','I love you','I love you','I love you','♥'];

  // Beautiful pink palette
  const COLORS = [
    '#ff80ab','#f06292','#e91e8c','#ff4081',
    '#ffb3c6','#ff6090','#d81b60','#ff8fb1',
    '#fce4ec','#f48fb1','#ec407a','#ff69b4',
    '#ff9ec8','#ff5c8a','#ffcdd2','#e8448a',
  ];

  /* ── heart implicit formula for point-in-heart test ── */
  function insideHeart(nx, ny) {
    // (x²+y²−1)³ − x²y³ ≤ 0
    const v = Math.pow(nx*nx + ny*ny - 1, 3) - nx*nx * ny*ny*ny;
    return v <= 0.0;
  }

  /* ── sample a random point strictly inside the heart ── */
  function sampleInsideHeart() {
    let nx, ny;
    do {
      nx = (Math.random() * 2.1) - 1.05;  // x range ~[-1,1]
      ny = (Math.random() * 2.2) - 1.4;   // y range ~[-1.4, 0.8] covers heart
    } while (!insideHeart(nx, ny));
    return { nx, ny };
  }

  let particles = [];

  function init() {
    particles = [];
    const W     = canvas.width;
    const H     = canvas.height;
    const isMob = W < 600;

    // Heart center & scale — heart sits in lower half of screen, well sized for mobile
    const heartR  = isMob
      ? Math.min(W * 0.38, H * 0.28)
      : Math.min(W * 0.28, H * 0.32);
    const heartCX = W / 2;
    const heartCY = H * 0.62;  // sits in lower portion, visible below the card

    // 400 particles exactly
    const COUNT = 400;

    for (let i = 0; i < COUNT; i++) {
      // ── target: uniformly random point inside heart ──
      const { nx, ny } = sampleInsideHeart();
      // map normalised heart coords → screen coords
      // heart formula range: x ∈ [-1,1], y ∈ [-1.2, 0.5]
      const tx = heartCX + nx * heartR;
      const ty = heartCY - ny * heartR;   // flip y so heart points up

      // ── start: scattered all over the screen ──
      const sx = Math.random() * W;
      const sy = Math.random() * H;

      // ── drift: each particle floats slowly to a SECOND point inside heart ──
      const { nx: nx2, ny: ny2 } = sampleInsideHeart();
      const tx2 = heartCX + nx2 * heartR;
      const ty2 = heartCY - ny2 * heartR;

      // varied font size for depth — some small (far), some big (near)
      const baseSize = isMob ? 7 : 9;
      const size = baseSize + Math.random() * (isMob ? 5 : 7); // 7–12px mobile, 9–16px desktop

      // small random static offset so particles don't sit on a rigid grid
      const offsetX = (Math.random() - 0.5) * (isMob ? 6 : 10);
      const offsetY = (Math.random() - 0.5) * (isMob ? 4 : 7);

      particles.push({
        sx, sy,                          // scatter start
        tx: tx + offsetX,                // target 1 (inside heart + offset)
        ty: ty + offsetY,
        tx2: tx2 + offsetX * 0.5,        // target 2 (drift destination)
        ty2: ty2 + offsetY * 0.5,
        word:  WORDS[Math.floor(Math.random() * WORDS.length)],
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        size,
        alpha: 0,
        // fly-in timing — very staggered for a gentle wave effect
        delay:  Math.random() * 5.0,
        flyDur: 4.0 + Math.random() * 3.0,   // 4–7s slow fly-in
        // drift timing — slow romantic float between two heart points
        driftDur: 8 + Math.random() * 12,     // 8–20s per drift leg
        driftOff: Math.random() * 20,         // randomise drift phase start
        // micro-wobble
        wobbleAmp:  0.5 + Math.random() * 1.2,
        wobbleFreq: 0.2 + Math.random() * 0.4,
        wobblePhase: Math.random() * Math.PI * 2,
        // pulse
        pulseOff: Math.random() * Math.PI * 2,
        // opacity depth variation — farther particles slightly dimmer
        depthAlpha: 0.55 + Math.random() * 0.45,
      });
    }
  }

  init();

  function easeOutCubic(t)  { return 1 - Math.pow(1 - t, 3); }
  function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }

  const startTime = performance.now();

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const now     = performance.now();
    const elapsed = (now - startTime) / 1000;

    // slow global heartbeat pulse
    const heartbeat = 1 + Math.sin(elapsed * 0.55) * 0.035;

    particles.forEach(p => {
      const localT = elapsed - p.delay;
      if (localT < 0) return;

      let drawX, drawY, drawSize, alpha;

      if (localT < p.flyDur) {
        // ══ PHASE 1: slow fly-in from scatter → heart position ══
        const prog = localT / p.flyDur;
        const ep   = easeOutCubic(prog);

        drawX = p.sx + (p.tx - p.sx) * ep;
        drawY = p.sy + (p.ty - p.sy) * ep;
        alpha = Math.min(prog * 1.8, 1) * p.depthAlpha;
        drawSize = p.size;

      } else {
        // ══ PHASE 2: gentle romantic drift between two heart points ══
        alpha    = p.depthAlpha;
        const driftT   = (elapsed - p.delay - p.flyDur + p.driftOff);
        const cycle    = (driftT / p.driftDur) % 1;
        const pingpong = Math.floor((driftT / p.driftDur)) % 2 === 0;
        const eased    = easeInOutSine(pingpong ? cycle : 1 - cycle);

        drawX = p.tx + (p.tx2 - p.tx) * eased;
        drawY = p.ty + (p.ty2 - p.ty) * eased;

        // small organic wobble — makes each word feel gently alive
        drawX += Math.sin(elapsed * p.wobbleFreq + p.wobblePhase) * p.wobbleAmp;
        drawY += Math.cos(elapsed * p.wobbleFreq * 0.8 + p.wobblePhase) * p.wobbleAmp * 0.6;

        // size pulses gently with the heartbeat
        drawSize = p.size
          * heartbeat
          * (1 + Math.sin(elapsed * 0.6 + p.pulseOff) * 0.04);
      }

      ctx.save();
      ctx.globalAlpha  = alpha;
      ctx.fillStyle    = p.color;
      ctx.font         = `bold ${(drawSize || p.size).toFixed(2)}px 'Nunito', sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';

      // soft glow — stronger on ♥ symbols
      ctx.shadowColor = p.color;
      ctx.shadowBlur  = p.word === '♥' ? 12 : 4;

      ctx.fillText(p.word, drawX, drawY);
      ctx.restore();
    });

    requestAnimationFrame(draw);
  }

  draw();
}

/* ══════════════════════════════════════
   BALLOONS — touch + click
══════════════════════════════════════ */
const BALLOONS = ['🎈','🎉','🎊','💕','🎀','🌹'];
function spawnBalloons(cx, cy) {
  if (!intro.classList.contains('hide')) return;
  for (let b=0; b<5; b++) {
    const el = document.createElement('div');
    el.className = 'balloon';
    el.textContent = BALLOONS[Math.random()*BALLOONS.length|0];
    el.style.left  = (cx-15+(Math.random()-.5)*70)+'px';
    el.style.top   = cy+'px';
    el.style.animationDuration = (2+Math.random())+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3500);
  }
}
document.addEventListener('click',   e => spawnBalloons(e.clientX, e.clientY));
document.addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  spawnBalloons(t.clientX, t.clientY);
}, { passive:true });
</script>
</body>
</html>
