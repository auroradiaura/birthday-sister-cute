<html>
<head>

<style>
body{

}

#messageContainer{
  position:absolute;
  top:12%;
  width:90%;

  left:50%;
  transform:translateX(-50%);
  text-align:center;
  z-index:2;
  display:none;
}

#title{
  font-size:6vw; 
  font-weight:bold;
  color:white;
  text-shadow:0 0 20px #fff, 0 0 40px #ffd1dc;
  margin-bottom:20px;
}

#typing{
  font-size:4vw;
  color:#fff5f5;
  line-height:1.6;
  text-align:center;
  word-wrap:break-word;
  max-width:100%;
}
@media (min-width:600px){
  #title{font-size:36px;}
  #typing{font-size:18px;}
}
</style>
</head>
<body>

<div id="messageContainer">
  <div id="title">Happy Birthday Sister 🎀</div>
  <span id="typing"></span>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ---------------- Countdown ----------------
let count = 1;
const countDiv = document.getElementById("count");
let countdown = setInterval(()=>{
  count++;
  if(count > 3){
    clearInterval(countdown);
    countDiv.style.display = "none";
    showBirthday();
  } else {
    countDiv.innerText = count;
  }
},1000);

// ---------------- Decorations ----------------
let decorations = [];
function createDecorations(){
  decorations=[];
  for(let i=0;i<180;i++){
    const rand = Math.random();
    let type;
    if(rand < 0.4) type="confetti";
    else if(rand < 0.6) type="star";
    else if(rand < 0.8) type="doll";
    else type="bow";
    decorations.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height - canvas.height,
      r: Math.random()*5 + 3,
      type:type,
      color: type==="confetti"? `hsl(${Math.random()*360},100%,70%)` : type==="star"? "#fff":"#ff69b4",
      tilt: Math.random()*10 - 5,
      angle: Math.random()*2*Math.PI
    });
  }
}

function drawDecorations(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  decorations.forEach(d=>{
    ctx.save();
    ctx.translate(d.x,d.y);
    ctx.rotate(d.angle);
    if(d.type==="confetti"){
      ctx.fillStyle=d.color;
      ctx.fillRect(-d.r/2,-d.r/2,d.r,d.r);
    } else if(d.type==="star"){
      ctx.fillStyle=d.color;
      ctx.shadowColor="#fff";
      ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.arc(0,0,d.r,0,2*Math.PI);
      ctx.fill();
    } else if(d.type==="doll"){
      ctx.font=`${d.r*4}px Arial`;
      ctx.fillStyle=d.color;
      ctx.fillText("🧸", -d.r*2, d.r*2);
    } else if(d.type==="bow"){
      ctx.font=`${d.r*4}px Arial`;
      ctx.fillStyle=d.color;
      ctx.fillText("🎀", -d.r*2, d.r*2);
    }
    ctx.restore();

    // movement
    d.y += 1.5;
    d.x += Math.sin(d.y*0.02);
    d.angle += 0.01;
    if(d.y>canvas.height){d.y=-10; d.x=Math.random()*canvas.width;}
  });
  requestAnimationFrame(drawDecorations);
}
