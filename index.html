<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sister</title>

<style>

body{
margin:0;
padding:0;
background:pink;
font-family:Arial, Helvetica, sans-serif;
overflow-x:hidden;
text-align:center;
}

.container{
padding-top:80px;
position:relative;
z-index:2;
}

/* Countdown numbers */

.count{
font-size:70px;
font-weight:bold;
color:white;
opacity:0;
transition:opacity .5s;
}

/* Big words */

.bigwords{
font-size:45px;
color:white;
font-weight:bold;
margin-top:20px;
opacity:0;
}

/* Title */

.title{
font-size:40px;
color:#d1004b;
margin-top:25px;
opacity:0;
}

/* Typing message */

.message{
margin:30px auto;
max-width:85%;
font-size:18px;
color:white;
line-height:1.6;
min-height:120px;
}

/* Roses */

.rose-area{
position:fixed;
bottom:0;
width:100%;
height:220px;
pointer-events:none;
}

.rose{
position:absolute;
bottom:-60px;
font-size:35px;
animation:grow 3s forwards;
}

@keyframes grow{
0%{transform:translateY(120px) scale(0);opacity:0;}
70%{opacity:1;}
100%{transform:translateY(0) scale(1);}
}

/* Confetti */

.confetti{
position:fixed;
top:-10px;
width:10px;
height:10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* Mobile */

@media(max-width:600px){

.count{font-size:50px}

.bigwords{font-size:32px}

.title{font-size:28px}

.message{font-size:16px}

}

</style>
</head>

<body>

<div class="container">

<div id="c1" class="count">1</div>
<div id="c2" class="count">2</div>
<div id="c3" class="count">3</div>

<div id="big" class="bigwords">
Happy Birthday To You
</div>

<div id="title" class="title">
Happy Birthday Sister
</div>

<div id="message" class="message"></div>

</div>

<div class="rose-area" id="roses"></div>

<script>

/* Countdown */

function show(id){
document.getElementById(id).style.opacity=1
}

function hide(id){
document.getElementById(id).style.opacity=0
}

setTimeout(()=>{show("c1")},500)
setTimeout(()=>{hide("c1")},1400)

setTimeout(()=>{show("c2")},1600)
setTimeout(()=>{hide("c2")},2500)

setTimeout(()=>{show("c3")},2700)
setTimeout(()=>{hide("c3")},3600)

setTimeout(()=>{
document.getElementById("big").style.opacity=1
},3800)

setTimeout(()=>{
document.getElementById("title").style.opacity=1
startRoses()
startTyping()
startConfetti()
},5500)


/* Roses */

function startRoses(){

let area=document.getElementById("roses")

for(let i=0;i<25;i++){

let r=document.createElement("div")
r.className="rose"
r.innerHTML="🌹"

r.style.left=Math.random()*100+"%"
r.style.animationDelay=Math.random()*2+"s"

area.appendChild(r)

}

}
